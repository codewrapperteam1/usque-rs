name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CROSS_CONFIG: Cross.toml

jobs:
  build:
    name: Build / ${{ matrix.target }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # ── x86_64 ──────────────────────────────────────────────────────
          - target: x86_64-unknown-linux-musl
            artifact_name: usque-rs-x86_64-linux-musl

          # ── 64-bit ARM ───────────────────────────────────────────────────
          - target: aarch64-unknown-linux-musl
            artifact_name: usque-rs-aarch64-linux-musl

          # ── 32-bit ARM ───────────────────────────────────────────────────
          - target: armv7-unknown-linux-musleabihf
            artifact_name: usque-rs-armv7-linux-musleabihf

          - target: arm-unknown-linux-musleabi
            artifact_name: usque-rs-arm-linux-musleabi

          - target: armv5te-unknown-linux-musleabi
            artifact_name: usque-rs-armv5te-linux-musleabi

          # ── Android ──────────────────────────────────────────────────────
          # ANDROID_NDK_HOME must point to the NDK r26c installed by Cross.toml
          # pre-build steps inside the container. The CI runner's own NDK path
          # is overridden here so quiche's build script finds the right toolchain.
          - target: aarch64-linux-android
            artifact_name: usque-rs-aarch64-linux-android
            android_ndk_home: /opt/android-ndk
            android_linker: /opt/android-ndk/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang

          - target: armv7-linux-androideabi
            artifact_name: usque-rs-armv7-linux-androideabi
            android_ndk_home: /opt/android-ndk
            android_linker: /opt/android-ndk/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi21-clang

          # ── MIPS (OpenWrt routers) ────────────────────────────────────────
          # mipsel = little-endian (MIPS24Kc etc.); big-endian mips and
          # mips64el are excluded: BoringSSL doesn't support those processors
          # (at least I couldn't get it working).
          # rust-std was removed from stable for MIPS; nightly + build-std used.
          - target: mipsel-unknown-linux-musl
            artifact_name: usque-rs-mipsel-linux-musl
            toolchain: nightly
            # build-std only compiles std, not panic_abort; keep unwind for this target
            panic_strategy: unwind

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain || 'stable' }}

      - name: Cache Rust registry
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build (release)
        env:
          CARGO_PROFILE_RELEASE_PANIC: ${{ matrix.panic_strategy || 'abort' }}
          ANDROID_NDK_HOME: ${{ matrix.android_ndk_home || '' }}
          CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER: ${{ matrix.android_linker || '' }}
          CARGO_TARGET_ARMV7_LINUX_ANDROIDEABI_LINKER: ${{ matrix.android_linker || '' }}
        run: cross build --release --target ${{ matrix.target }}

      - name: Strip binary
        run: |
          sudo apt-get install -y --no-install-recommends llvm 2>/dev/null || true
          if command -v llvm-strip &>/dev/null; then
            llvm-strip --strip-all target/${{ matrix.target }}/release/usque-rs
          else
            # Fallback: find the versioned llvm-strip (e.g. llvm-strip-18)
            STRIP=$(ls /usr/bin/llvm-strip-* 2>/dev/null | sort -V | tail -1)
            if [[ -n "$STRIP" ]]; then
              "$STRIP" --strip-all target/${{ matrix.target }}/release/usque-rs
            else
              echo "No llvm-strip found, skipping strip step."
            fi
          fi

      - name: Package archive
        id: pkg
        run: |
          ARCHIVE="${{ matrix.artifact_name }}-${{ github.ref_name }}.tar.gz"
          tar czf "$ARCHIVE" \
            -C target/${{ matrix.target }}/release \
            usque-rs
          echo "archive=$ARCHIVE" >> "$GITHUB_OUTPUT"
          echo "sha256=$(sha256sum "$ARCHIVE" | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Generate checksum
        run: |
          sha256sum "${{ steps.pkg.outputs.archive }}" \
            > "${{ steps.pkg.outputs.archive }}.sha256"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.pkg.outputs.archive }}
            ${{ steps.pkg.outputs.archive }}.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true
